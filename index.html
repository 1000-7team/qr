<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Офлайн QR и штрих-коды</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #4a90e2;
            padding: 15px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        h1 { text-align: center; margin-bottom: 20px; font-size: 24px; color: #333; }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab {
            flex: 1;
            padding: 12px;
            background: #f0f0f0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }
        .tab.active {
            background: #4a90e2;
            color: white;
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #4a90e2;
        }
        button {
            width: 100%;
            padding: 15px;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background: #357abd;
        }
        .result {
            margin-top: 20px;
            text-align: center;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 8px;
            min-height: 200px;
        }
        canvas {
            max-width: 100%;
            border: 1px solid #ddd;
            background: white;
        }
        .download-btn {
            background: #27ae60;
            margin-top: 15px;
        }
        .download-btn:hover {
            background: #219a52;
        }
        .offline-badge {
            text-align: center;
            margin-bottom: 15px;
            padding: 8px;
            background: #f1c40f;
            color: #333;
            border-radius: 5px;
            font-weight: bold;
            display: none;
        }
        .status {
            text-align: center;
            margin-bottom: 10px;
            font-size: 14px;
        }
    </style>
    
    <!-- БИБЛИОТЕКИ - БЕРУТСЯ ИЗ CDN -->
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/upup@1.1.0/dist/upup.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>QR и Штрих-коды</h1>
        
        <div class="offline-badge" id="offlineBadge">
            🔥 ОФЛАЙН РЕЖИМ - РАБОТАЕТ БЕЗ ИНТЕРНЕТА
        </div>
        
        <div class="status" id="status">
            ⚡ Загрузка...
        </div>
        
        <div class="tabs">
            <button class="tab active" onclick="showTab('barcode')">📊 ШТРИХ-КОД</button>
            <button class="tab" onclick="showTab('qr')">🔲 QR-КОД</button>
        </div>
        
        <!-- ШТРИХ-КОД -->
        <div id="barcodeSection">
            <div class="input-group">
                <label>Текст:</label>
                <input type="text" id="barcodeText" value="12345678" placeholder="Введите текст">
            </div>
            <div class="input-group">
                <label>Формат:</label>
                <select id="barcodeFormat">
                    <option value="CODE128">CODE128</option>
                    <option value="EAN13">EAN13</option>
                    <option value="EAN8">EAN8</option>
                    <option value="CODE39">CODE39</option>
                </select>
            </div>
            <button onclick="makeBarcode()">СОЗДАТЬ ШТРИХ-КОД</button>
        </div>
        
        <!-- QR-КОД -->
        <div id="qrSection" style="display: none;">
            <div class="input-group">
                <label>Текст или ссылка:</label>
                <input type="text" id="qrText" value="https://google.com" placeholder="Введите текст">
            </div>
            <div class="input-group">
                <label>Размер:</label>
                <input type="number" id="qrSize" value="250" min="100" max="500">
            </div>
            <button onclick="makeQR()">СОЗДАТЬ QR-КОД</button>
        </div>
        
        <!-- РЕЗУЛЬТАТ -->
        <div class="result" id="result">
            <div id="barcodeResult"></div>
            <div id="qrResult"></div>
            <button class="download-btn" id="downloadBtn" onclick="downloadCode()" style="display: none;">
                💾 СКАЧАТЬ
            </button>
        </div>
    </div>

    <script>
        // ПРОСТЕЙШАЯ НАСТРОЙКА UPPUP - МГНОВЕННОЕ КЭШИРОВАНИЕ
        if ('serviceWorker' in navigator) {
            UpUp.start({
                'content': document.documentElement.outerHTML, // КЭШИРУЕМ СРАЗУ ВСЮ СТРАНИЦУ
                'assets': [
                    'https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js',
                    'https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js'
                ]
            });
        }

        // ПЕРЕМЕННЫЕ
        let currentType = 'barcode';
        let currentImageData = null;
        
        // ПРОВЕРКА ИНТЕРНЕТА
        function checkOnline() {
            if (!navigator.onLine) {
                document.getElementById('offlineBadge').style.display = 'block';
                document.getElementById('status').innerHTML = '✅ РАБОТАЕТ ОФЛАЙН!';
            } else {
                document.getElementById('status').innerHTML = '🌐 Есть интернет - кэшируем...';
                setTimeout(() => {
                    document.getElementById('status').innerHTML = '✅ Можно отключать интернет';
                }, 2000);
            }
        }
        
        // ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК
        function showTab(type) {
            currentType = type;
            
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            if (type === 'barcode') {
                document.getElementById('barcodeSection').style.display = 'block';
                document.getElementById('qrSection').style.display = 'none';
            } else {
                document.getElementById('barcodeSection').style.display = 'none';
                document.getElementById('qrSection').style.display = 'block';
            }
            
            document.getElementById('downloadBtn').style.display = 'none';
        }
        
        // СОЗДАТЬ ШТРИХ-КОД
        function makeBarcode() {
            const text = document.getElementById('barcodeText').value;
            const format = document.getElementById('barcodeFormat').value;
            
            if (!text) {
                alert('Введите текст!');
                return;
            }
            
            document.getElementById('barcodeResult').innerHTML = '<canvas id="barcodeCanvas"></canvas>';
            document.getElementById('qrResult').innerHTML = '';
            
            try {
                JsBarcode('#barcodeCanvas', text, {
                    format: format,
                    width: 2,
                    height: 80,
                    displayValue: true,
                    fontSize: 16
                });
                
                currentImageData = document.getElementById('barcodeCanvas').toDataURL('image/png');
                document.getElementById('downloadBtn').style.display = 'block';
                
            } catch(e) {
                alert('Ошибка: ' + e.message);
            }
        }
        
        // СОЗДАТЬ QR-КОД
        function makeQR() {
            const text = document.getElementById('qrText').value;
            const size = parseInt(document.getElementById('qrSize').value);
            
            if (!text) {
                alert('Введите текст!');
                return;
            }
            
            document.getElementById('qrResult').innerHTML = '<canvas id="qrCanvas"></canvas>';
            document.getElementById('barcodeResult').innerHTML = '';
            
            QRCode.toCanvas(document.getElementById('qrCanvas'), text, {
                width: size,
                margin: 1
            }, function(err) {
                if (err) {
                    alert('Ошибка: ' + err);
                } else {
                    currentImageData = document.getElementById('qrCanvas').toDataURL('image/png');
                    document.getElementById('downloadBtn').style.display = 'block';
                }
            });
        }
        
        // СКАЧАТЬ
        function downloadCode() {
            if (!currentImageData) return;
            
            const link = document.createElement('a');
            link.download = currentType === 'barcode' ? 'barcode.png' : 'qrcode.png';
            link.href = currentImageData;
            link.click();
        }
        
        // ЗАПУСК
        window.onload = function() {
            checkOnline();
            setTimeout(makeBarcode, 100); // Сразу показываем пример
            
            // МГНОВЕННОЕ ОБНОВЛЕНИЕ СТАТУСА
            window.addEventListener('online', checkOnline);
            window.addEventListener('offline', checkOnline);
        };
    </script>
</body>
</html>
