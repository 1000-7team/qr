<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор QR и штрих-кодов (офлайн)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            text-align: center;
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }
        
        .mode-banner {
            text-align: center;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 25px;
            font-weight: bold;
            font-size: 18px;
        }
        
        .online-mode {
            background: #27ae60;
            color: white;
        }
        
        .offline-mode {
            background: #e74c3c;
            color: white;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        
        .tab {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: #f0f0f0;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .tab:hover {
            background: #e0e0e0;
        }
        
        .tab.active {
            background: #667eea;
            color: white;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        
        input, select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            width: 100%;
            padding: 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        
        .btn:hover {
            background: #5a67d8;
        }
        
        .btn-download {
            background: #27ae60;
        }
        
        .btn-download:hover {
            background: #219a52;
        }
        
        .result {
            margin-top: 30px;
            text-align: center;
            padding: 25px;
            background: #f8f9fa;
            border-radius: 15px;
            min-height: 250px;
        }
        
        canvas {
            max-width: 100%;
            background: white;
            border: 2px solid #ddd;
            border-radius: 10px;
            padding: 10px;
        }
        
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #999;
            font-size: 14px;
        }
    </style>
    
    <!-- Библиотеки -->
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/upup@1.1.0/dist/upup.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>📱 Генератор кодов</h1>
        <div class="subtitle">QR и штрих-коды без интернета</div>
        
        <!-- Баннер статуса -->
        <div id="statusBanner" class="mode-banner online-mode">
            🌐 Есть интернет - полная версия
        </div>
        
        <!-- Вкладки -->
        <div class="tabs">
            <button class="tab active" onclick="switchTab('barcode')">📊 Штрих-код</button>
            <button class="tab" onclick="switchTab('qr')">🔲 QR-код</button>
        </div>
        
        <!-- Полная версия (онлайн) -->
        <div id="fullVersion">
            <!-- Штрих-код секция -->
            <div id="barcodeSection">
                <div class="input-group">
                    <label>Текст для штрих-кода:</label>
                    <input type="text" id="barcodeText" value="12345678" placeholder="Введите текст">
                </div>
                
                <div class="input-group">
                    <label>Формат:</label>
                    <select id="barcodeFormat">
                        <option value="CODE128">CODE128 (любые символы)</option>
                        <option value="EAN13">EAN-13 (13 цифр)</option>
                        <option value="EAN8">EAN-8 (8 цифр)</option>
                        <option value="CODE39">CODE39</option>
                    </select>
                </div>
                
                <button class="btn" onclick="generateBarcode()">Создать штрих-код</button>
            </div>
            
            <!-- QR-код секция -->
            <div id="qrSection" style="display: none;">
                <div class="input-group">
                    <label>Текст или ссылка:</label>
                    <input type="text" id="qrText" value="https://google.com" placeholder="Введите текст">
                </div>
                
                <div class="input-group">
                    <label>Размер:</label>
                    <input type="number" id="qrSize" value="250" min="100" max="500">
                </div>
                
                <button class="btn" onclick="generateQR()">Создать QR-код</button>
            </div>
        </div>
        
        <!-- Упрощенная версия (офлайн) -->
        <div id="simpleVersion" style="display: none;">
            <div class="input-group">
                <label>Текст:</label>
                <input type="text" id="simpleText" value="12345678" placeholder="Введите текст">
            </div>
            
            <div class="input-group">
                <label>Тип:</label>
                <select id="simpleType">
                    <option value="barcode">Штрих-код</option>
                    <option value="qr">QR-код</option>
                </select>
            </div>
            
            <button class="btn" onclick="generateSimple()">Создать код</button>
        </div>
        
        <!-- Результат -->
        <div class="result" id="result">
            <div id="codeContainer"></div>
            <button class="btn btn-download" id="downloadBtn" onclick="downloadCode()" style="display: none;">
                💾 Скачать
            </button>
        </div>
        
        <div class="footer">
            ✅ После первого запуска работает без интернета
        </div>
    </div>

    <script>
        // Переменные
        let currentTab = 'barcode';
        let currentImage = null;
        
        // Настройка UpUp для офлайн работы
        if ('serviceWorker' in navigator) {
            UpUp.start({
                'cache-version': 'v1.0',
                'content': document.documentElement.outerHTML,
                'assets': [
                    'https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js',
                    'https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js'
                ]
            });
        }
        
        // Проверка интернета
        function checkConnection() {
            const banner = document.getElementById('statusBanner');
            const fullVersion = document.getElementById('fullVersion');
            const simpleVersion = document.getElementById('simpleVersion');
            
            if (navigator.onLine) {
                banner.className = 'mode-banner online-mode';
                banner.innerHTML = '🌐 Есть интернет - полная версия';
                fullVersion.style.display = 'block';
                simpleVersion.style.display = 'none';
            } else {
                banner.className = 'mode-banner offline-mode';
                banner.innerHTML = '📴 ОФЛАЙН РЕЖИМ - упрощенная версия';
                fullVersion.style.display = 'none';
                simpleVersion.style.display = 'block';
            }
        }
        
        // Переключение вкладок
        function switchTab(tab) {
            if (!navigator.onLine) return;
            
            currentTab = tab;
            
            // Обновляем активную вкладку
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            // Показываем нужную секцию
            if (tab === 'barcode') {
                document.getElementById('barcodeSection').style.display = 'block';
                document.getElementById('qrSection').style.display = 'none';
            } else {
                document.getElementById('barcodeSection').style.display = 'none';
                document.getElementById('qrSection').style.display = 'block';
            }
            
            document.getElementById('downloadBtn').style.display = 'none';
        }
        
        // Генерация штрих-кода
        function generateBarcode() {
            const text = document.getElementById('barcodeText').value;
            const format = document.getElementById('barcodeFormat').value;
            
            if (!text) {
                alert('Введите текст!');
                return;
            }
            
            const container = document.getElementById('codeContainer');
            container.innerHTML = '<canvas id="mainCanvas"></canvas>';
            
            try {
                JsBarcode('#mainCanvas', text, {
                    format: format,
                    width: 2,
                    height: 80,
                    displayValue: true,
                    fontSize: 18,
                    margin: 10
                });
                
                const canvas = document.getElementById('mainCanvas');
                currentImage = canvas.toDataURL('image/png');
                document.getElementById('downloadBtn').style.display = 'block';
                
            } catch(e) {
                alert('Ошибка: ' + e.message);
            }
        }
        
        // Генерация QR-кода
        function generateQR() {
            const text = document.getElementById('qrText').value;
            const size = parseInt(document.getElementById('qrSize').value);
            
            if (!text) {
                alert('Введите текст!');
                return;
            }
            
            const container = document.getElementById('codeContainer');
            container.innerHTML = '<canvas id="mainCanvas"></canvas>';
            
            QRCode.toCanvas(document.getElementById('mainCanvas'), text, {
                width: size,
                margin: 2
            }, function(err) {
                if (err) {
                    alert('Ошибка: ' + err);
                } else {
                    const canvas = document.getElementById('mainCanvas');
                    currentImage = canvas.toDataURL('image/png');
                    document.getElementById('downloadBtn').style.display = 'block';
                }
            });
        }
        
        // Генерация в упрощенном режиме
        function generateSimple() {
            const text = document.getElementById('simpleText').value;
            const type = document.getElementById('simpleType').value;
            
            if (!text) {
                alert('Введите текст!');
                return;
            }
            
            const container = document.getElementById('codeContainer');
            container.innerHTML = '<canvas id="simpleCanvas"></canvas>';
            
            if (type === 'barcode') {
                try {
                    JsBarcode('#simpleCanvas', text, {
                        format: 'CODE128',
                        width: 2,
                        height: 80,
                        displayValue: true,
                        fontSize: 16
                    });
                    
                    const canvas = document.getElementById('simpleCanvas');
                    currentImage = canvas.toDataURL('image/png');
                    document.getElementById('downloadBtn').style.display = 'block';
                    
                } catch(e) {
                    alert('Ошибка: ' + e.message);
                }
            } else {
                QRCode.toCanvas(document.getElementById('simpleCanvas'), text, {
                    width: 200,
                    margin: 1
                }, function(err) {
                    if (!err) {
                        const canvas = document.getElementById('simpleCanvas');
                        currentImage = canvas.toDataURL('image/png');
                        document.getElementById('downloadBtn').style.display = 'block';
                    }
                });
            }
        }
        
        // Скачивание
        function downloadCode() {
            if (!currentImage) return;
            
            const link = document.createElement('a');
            link.download = 'code.png';
            link.href = currentImage;
            link.click();
        }
        
        // Запуск при загрузке
        window.addEventListener('load', function() {
            checkConnection();
            
            window.addEventListener('online', checkConnection);
            window.addEventListener('offline', checkConnection);
            
            // Генерируем пример
            setTimeout(() => {
                if (navigator.onLine) {
                    generateBarcode();
                } else {
                    generateSimple();
                }
            }, 500);
        });
    </script>
</body>
</html>
